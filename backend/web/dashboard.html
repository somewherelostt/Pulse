<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0A0A0F; --sidebar: #0D0D14; --card: #111118; --border: #1E1E2A;
      --border2: #2A2A3A; --primary: #6E7BF2; --teal: #4ECDC4;
      --text: #E8E8F0; --muted: #6B6B7E; --muted2: #888899;
      --red: #EF4444; --amber: #F7B731; --green: #22C55E;
      --sidebar-w: 200px;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; }

    /* Sidebar */
    nav { width: var(--sidebar-w); min-height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; padding: 24px 0; position: sticky; top: 0; }
    .logo { padding: 0 20px 32px; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--primary); }
    .nav-section { padding: 0 12px; margin-bottom: 4px; }
    .nav-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0 8px; margin-bottom: 6px; margin-top: 16px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--muted2); text-decoration: none; cursor: pointer; transition: all 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: rgba(110,123,242,0.15); color: var(--primary); }
    .nav-item .icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-footer { margin-top: auto; padding: 16px 20px; }
    .sync-info { font-size: 11px; color: var(--muted); }

    /* Main content */
    .content { flex: 1; overflow-y: auto; padding: 32px 32px 48px; min-width: 0; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-title { font-size: 22px; font-weight: 300; letter-spacing: -0.3px; }
    .page-sub { font-size: 13px; color: var(--muted2); margin-top: 3px; }

    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 7px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Metric cards */
    .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .metric-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 10px; }
    .metric-value { font-size: 32px; font-weight: 200; letter-spacing: -1.5px; line-height: 1; }
    .metric-unit { font-size: 14px; color: var(--muted2); }
    .metric-delta { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; margin-top: 8px; }
    .delta-up { color: var(--green); }
    .delta-down { color: var(--red); }
    .delta-stable { color: var(--muted2); }
    .metric-card.risk-low .metric-value { color: var(--green); }
    .metric-card.risk-mid .metric-value { color: var(--amber); }
    .metric-card.risk-high .metric-value { color: var(--red); }

    /* Chart section */
    .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 14px; font-weight: 600; }
    .section-sub { font-size: 12px; color: var(--muted2); margin-top: 2px; }
    .chart-wrap { position: relative; height: 220px; }

    /* Toggle pills for chart */
    .toggle-pills { display: flex; gap: 6px; }
    .pill-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border2); background: transparent; color: var(--muted2); font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .pill-btn.on { border-color: var(--primary); background: rgba(110,123,242,0.15); color: var(--primary); }

    /* Correlation table */
    .corr-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .corr-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); padding: 0 0 12px; font-weight: 500; border-bottom: 1px solid var(--border); }
    .corr-table td { padding: 11px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .corr-table tr:last-child td { border-bottom: none; }
    .corr-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .corr-bar { height: 4px; border-radius: 2px; min-width: 2px; }
    .corr-bar.pos { background: var(--teal); }
    .corr-bar.neg { background: var(--red); }
    .corr-val { font-size: 12px; color: var(--muted2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-sig { background: rgba(78,205,196,0.12); color: var(--teal); border: 1px solid rgba(78,205,196,0.25); }
    .badge-lag { background: rgba(110,123,242,0.12); color: var(--primary); border: 1px solid rgba(110,123,242,0.25); }

    /* Empty states */
    .empty { text-align: center; padding: 32px; color: var(--muted2); font-size: 13px; }
    .empty a { color: var(--primary); text-decoration: none; }

    /* Insight card */
    .insight-card { background: rgba(110,123,242,0.06); border: 1px solid rgba(110,123,242,0.2); border-radius: 10px; padding: 18px 20px; margin-bottom: 16px; }
    .insight-summary { font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
    .insight-rec { font-size: 13px; color: var(--teal); padding: 10px 14px; background: rgba(78,205,196,0.08); border-radius: 7px; }
    .insight-patterns { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .pattern-row { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; }
    .pattern-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; margin-top: 6px; }
    .insight-meta { font-size: 11px; color: var(--muted); margin-top: 14px; }

    /* Two-column lower layout */
    .lower-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* Responsive */
    @media (max-width: 900px) {
      nav { display: none; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .lower-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 580px) {
      .content { padding: 20px 16px 40px; }
      .metrics-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .metric-value { font-size: 26px; }
    }

    /* Loading skeleton */
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, #1e1e2e 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .sk-line { height: 14px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <nav>
    <div class="logo">Pulse</div>
    <div class="nav-section">
      <div class="nav-label">Main</div>
      <a href="/dashboard" class="nav-item active"><span class="icon">◈</span> Dashboard</a>
      <a href="/log" class="nav-item"><span class="icon">✦</span> Log Mood</a>
      <a href="/circadian" class="nav-item"><span class="icon">◑</span> Circadian</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Account</div>
      <a href="/connect" class="nav-item"><span class="icon">⊕</span> Connect</a>
    </div>
    <div class="nav-footer">
      <div class="sync-info" id="sync-info">—</div>
    </div>
  </nav>

  <!-- Main content -->
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">Your patterns</div>
        <div class="page-sub" id="page-sub">Loading...</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-outline" onclick="syncCalendar()" id="sync-btn">Sync calendar</button>
        <button class="btn btn-primary" onclick="generateInsights()" id="gen-btn">Generate insights</button>
      </div>
    </div>

    <!-- Metric cards -->
    <div class="metrics-grid" id="metrics-grid">
      <div class="metric-card skeleton" style="height:100px"></div>
      <div class="metric-card skeleton" style="height:100px"></div>
      <div class="metric-card skeleton" style="height:100px"></div>
      <div class="metric-card skeleton" style="height:100px"></div>
    </div>

    <!-- Timeline chart -->
    <div class="section">
      <div class="section-header">
        <div>
          <div class="section-title">30-day timeline</div>
          <div class="section-sub">Mood, energy, and meeting load over time</div>
        </div>
        <div class="toggle-pills">
          <button class="pill-btn on" id="tog-mood" onclick="toggleSeries('mood')">Mood</button>
          <button class="pill-btn on" id="tog-energy" onclick="toggleSeries('energy')">Energy</button>
          <button class="pill-btn on" id="tog-density" onclick="toggleSeries('density')">Meetings</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="timeline-chart"></canvas>
      </div>
    </div>

    <!-- Lower 2-col -->
    <div class="lower-grid">
      <!-- Correlations -->
      <div class="section">
        <div class="section-header">
          <div>
            <div class="section-title">Top correlations</div>
            <div class="section-sub">Calendar behavior → mood</div>
          </div>
        </div>
        <div id="corr-body">
          <div class="sk-line skeleton" style="width:100%"></div>
          <div class="sk-line skeleton" style="width:80%"></div>
          <div class="sk-line skeleton" style="width:90%"></div>
        </div>
      </div>

      <!-- Insights -->
      <div class="section">
        <div class="section-header">
          <div>
            <div class="section-title">Latest insights</div>
            <div class="section-sub">AI-powered pattern analysis</div>
          </div>
        </div>
        <div id="insight-body">
          <div class="sk-line skeleton" style="width:100%"></div>
          <div class="sk-line skeleton" style="width:75%"></div>
          <div class="sk-line skeleton" style="width:85%"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    const token = localStorage.getItem('pulse_token');
    if (!token) { window.location.href = '/connect'; }

    let chart = null;
    let allDatasets = [];
    const seriesOn = { mood: true, energy: true, density: true };

    async function load() {
      try {
        const r = await fetch(`${API}/dashboard`, { headers: { Authorization: 'Bearer ' + token } });
        if (r.status === 401) { window.location.href = '/connect'; return; }
        const data = await r.json();
        renderMetrics(data.metrics, data.sync_status);
        renderTimeline(data.timeline);
        renderCorrelations(data.top_correlations);
        renderInsight(data.latest_insight);
        const sub = data.metrics && data.metrics.data_days > 0
          ? `${data.metrics.data_days} days logged · Last 30 days`
          : 'No data yet — log your mood to get started';
        document.getElementById('page-sub').textContent = sub;
        if (data.sync_status) {
          const sa = data.sync_status.last_synced_at;
          document.getElementById('sync-info').textContent = sa
            ? 'Synced ' + relativeTime(sa) : 'Never synced';
        }
      } catch(e) {
        document.getElementById('page-sub').textContent = 'Failed to load — is the server running?';
      }
    }

    function renderMetrics(m, sync) {
      if (!m) { document.getElementById('metrics-grid').innerHTML = '<div class="empty" style="grid-column:span 4">No data yet.</div>'; return; }
      const moodTrend = m.mood_trend;
      const densityTrend = m.meeting_density_trend;
      const avgMood = m.avg_mood_score ? m.avg_mood_score.toFixed(1) : '—';
      const avgDensity = m.avg_meeting_density_pct ? Math.round(m.avg_meeting_density_pct * 100) : 0;
      const moodDelta = m.mood_delta ? (m.mood_delta > 0 ? '+' : '') + m.mood_delta.toFixed(1) : '';

      // Compute a simple burnout risk score (0-100): high density + low mood = high risk
      let risk = 0;
      if (m.avg_meeting_density_pct) risk += m.avg_meeting_density_pct * 60;
      if (m.avg_mood_score) risk += (10 - m.avg_mood_score) * 4;
      risk = Math.min(100, Math.round(risk));
      const riskClass = risk < 30 ? 'risk-low' : risk < 65 ? 'risk-mid' : 'risk-high';
      const riskLabel = risk < 30 ? 'Low' : risk < 65 ? 'Moderate' : 'High';

      const deltaHTML = (delta, trend) => {
        if (!delta) return '';
        const cls = trend === 'up' ? 'delta-up' : trend === 'down' ? 'delta-down' : 'delta-stable';
        const arrow = trend === 'up' ? '↑' : trend === 'down' ? '↓' : '→';
        return `<div class="metric-delta ${cls}">${arrow} ${delta} vs prev week</div>`;
      };

      document.getElementById('metrics-grid').innerHTML = `
        <div class="metric-card">
          <div class="metric-label">Avg mood · 7d</div>
          <div class="metric-value">${avgMood} <span class="metric-unit">/10</span></div>
          ${deltaHTML(moodDelta, moodTrend)}
        </div>
        <div class="metric-card">
          <div class="metric-label">Meeting load · 7d</div>
          <div class="metric-value">${avgDensity}<span class="metric-unit">%</span></div>
          ${deltaHTML(m.meeting_density_delta ? (m.meeting_density_delta > 0 ? '+' : '') + Math.round(m.meeting_density_delta * 100) + '%' : '', densityTrend)}
        </div>
        <div class="metric-card">
          <div class="metric-label">Days logged · 30d</div>
          <div class="metric-value">${m.data_days || 0} <span class="metric-unit">days</span></div>
        </div>
        <div class="metric-card ${riskClass}">
          <div class="metric-label">Burnout risk</div>
          <div class="metric-value">${riskLabel}</div>
          <div class="metric-delta delta-stable" style="font-size:11px">${risk}/100 composite</div>
        </div>
      `;
    }

    function renderTimeline(timeline) {
      if (!timeline || timeline.length === 0) return;
      const labels = timeline.map(d => {
        const dt = new Date(d.date);
        return (dt.getMonth() + 1) + '/' + dt.getDate();
      });
      const moodData = timeline.map(d => d.mood_score ?? null);
      const energyData = timeline.map(d => d.energy_score ?? null);
      const densityData = timeline.map(d => d.meeting_density_pct != null ? Math.round(d.meeting_density_pct * 10) : null);

      allDatasets = [
        { id: 'mood', label: 'Mood', data: moodData, borderColor: '#6E7BF2', backgroundColor: 'rgba(110,123,242,0.08)', tension: 0.3, pointRadius: 3, pointHoverRadius: 5, spanGaps: false, yAxisID: 'y' },
        { id: 'energy', label: 'Energy', data: energyData, borderColor: '#4ECDC4', backgroundColor: 'rgba(78,205,196,0.06)', tension: 0.3, pointRadius: 3, pointHoverRadius: 5, spanGaps: false, yAxisID: 'y' },
        { id: 'density', label: 'Meetings %×10', data: densityData, borderColor: '#F7B731', backgroundColor: 'rgba(247,183,49,0.06)', tension: 0.3, pointRadius: 2, pointHoverRadius: 4, spanGaps: false, yAxisID: 'y', borderDash: [4,3] },
      ];

      const ctx = document.getElementById('timeline-chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: allDatasets.map(d => ({ ...d })) },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#16161F',
              borderColor: '#2A2A3A',
              borderWidth: 1,
              titleColor: '#888899',
              bodyColor: '#E8E8F0',
              padding: 10,
              callbacks: {
                label: ctx => {
                  const v = ctx.raw;
                  if (v == null) return null;
                  if (ctx.dataset.id === 'density') return `Meetings: ${v * 10}%`;
                  return `${ctx.dataset.label}: ${v}/10`;
                }
              }
            },
          },
          scales: {
            x: { ticks: { color: '#6B6B7E', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#1A1A24' } },
            y: { min: 0, max: 10, ticks: { color: '#6B6B7E', font: { size: 10 } }, grid: { color: '#1A1A24' } },
          },
        },
      });
    }

    function toggleSeries(id) {
      seriesOn[id] = !seriesOn[id];
      const btn = document.getElementById('tog-' + id);
      btn.classList.toggle('on', seriesOn[id]);
      if (!chart) return;
      chart.data.datasets = allDatasets.filter(d => seriesOn[d.id]).map(d => ({ ...d }));
      chart.update();
    }

    function renderCorrelations(corrs) {
      const el = document.getElementById('corr-body');
      if (!corrs || corrs.length === 0) {
        el.innerHTML = '<div class="empty">Not enough data yet.<br>Need 7+ days of mood logs + calendar sync.<br><a href="/log">Log mood</a> · <a href="/connect">Connect calendar</a></div>';
        return;
      }
      const featLabel = f => f.replace(/_/g, ' ').replace(/pct/, '%').replace(/mins/, 'min').replace(/avg /g, '');
      el.innerHTML = `
        <table class="corr-table">
          <thead><tr>
            <th>Feature</th><th>→ Metric</th><th>Strength</th><th></th>
          </tr></thead>
          <tbody>
            ${corrs.map(c => {
              const pct = Math.round(Math.abs(c.Correlation) * 100);
              const isPos = c.Correlation >= 0;
              return `<tr>
                <td>${featLabel(c.FeatureName)}</td>
                <td style="color:var(--muted2)">${c.MoodMetric.replace(/_/g,' ')}</td>
                <td>
                  <div class="corr-bar-wrap">
                    <div class="corr-bar ${isPos ? 'pos' : 'neg'}" style="width:${pct}px"></div>
                    <span class="corr-val">${isPos ? '+' : ''}${c.Correlation.toFixed(2)}</span>
                  </div>
                  ${c.BestLag > 0 ? `<div style="margin-top:4px"><span class="badge badge-lag">lag +${c.BestLag}d</span></div>` : ''}
                </td>
                <td>${c.Significant ? '<span class="badge badge-sig">sig</span>' : ''}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
      if (corrs[0] && corrs[0].PlainEnglish) {
        el.insertAdjacentHTML('beforeend', `<div style="margin-top:14px;font-size:12px;color:var(--muted2);line-height:1.5">${corrs[0].PlainEnglish}</div>`);
      }
    }

    function renderInsight(insight) {
      const el = document.getElementById('insight-body');
      if (!insight) {
        el.innerHTML = `<div class="empty">No insights yet.<br>Click <strong>Generate insights</strong> to run AI analysis.<br>(Requires 3+ mood logs)</div>`;
        return;
      }
      let html = '';
      if (insight.summary) {
        html += `<div class="insight-card"><div class="insight-summary">${esc(insight.summary)}</div>`;
        if (insight.recommendation) {
          html += `<div class="insight-rec">💡 ${esc(insight.recommendation)}</div>`;
        }
        if (insight.patterns && insight.patterns.length > 0) {
          html += `<div class="insight-patterns">`;
          insight.patterns.slice(0, 3).forEach(p => {
            html += `<div class="pattern-row"><div class="pattern-dot"></div><div>${esc(p.plain_english || p.PlainEnglish || '')}</div></div>`;
          });
          html += `</div>`;
        }
        if (insight.data_quality_note) {
          html += `<div class="insight-meta">${esc(insight.data_quality_note)}</div>`;
        }
        html += `</div>`;
      } else {
        html = `<div class="empty">Insight data malformed. Generate new insights.</div>`;
      }
      el.innerHTML = html;
    }

    async function syncCalendar() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true; btn.textContent = 'Syncing...';
      try {
        const r = await fetch(`${API}/calendar/sync`, { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
        const data = await r.json();
        btn.textContent = `Synced ${data.events_fetched || 0} events`;
        setTimeout(() => { btn.disabled = false; btn.textContent = 'Sync calendar'; load(); }, 2000);
      } catch(e) {
        btn.disabled = false; btn.textContent = 'Sync failed';
        setTimeout(() => { btn.textContent = 'Sync calendar'; }, 2000);
      }
    }

    async function generateInsights() {
      const btn = document.getElementById('gen-btn');
      btn.disabled = true; btn.textContent = 'Analyzing...';
      document.getElementById('insight-body').innerHTML = `
        <div class="sk-line skeleton" style="width:100%"></div>
        <div class="sk-line skeleton" style="width:80%"></div>
        <div class="sk-line skeleton" style="width:90%"></div>
      `;
      try {
        const r = await fetch(`${API}/insights/generate`, { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
        const data = await r.json();
        btn.disabled = false; btn.textContent = 'Generate insights';
        if (data.error) { renderInsight(null); alert(data.error); return; }
        renderInsight(data);
      } catch(e) {
        btn.disabled = false; btn.textContent = 'Generate insights';
        renderInsight(null);
      }
    }

    function relativeTime(iso) {
      const d = new Date(iso);
      const diff = (Date.now() - d) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.round(diff / 60) + 'm ago';
      if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
      return Math.round(diff / 86400) + 'd ago';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    load();
  </script>
</body>
</html>
